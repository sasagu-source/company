            updateThemeUI();
            
            renderTOC();
            loadChapter(0);
            
            // Initialize icons
            feather.replace();
        }

        // Render Table of Contents
        function renderTOC() {
            tocContainer.innerHTML = '';
            
            constitutionData.forEach((item, index) => {
                const link = document.createElement('button');
                link.className = `w-full text-left px-4 py-3 rounded-lg mb-1 transition-all duration-200 flex flex-col group ${
                    index === currentIndex 
                        ? 'bg-papua-earth/10 dark:bg-papua-gold/10 border-l-4 border-papua-earth dark:border-papua-gold' 
                        : 'hover:bg-gray-100 dark:hover:bg-gray-800 border-l-4 border-transparent text-gray-600 dark:text-gray-400'
                }`;
                link.onclick = () => {
                    loadChapter(index);
                    if(window.innerWidth < 768) toggleSidebar();
                };

                const labelStr = item.type === 'cover' ? 'Start' : (item.type === 'outro' ? 'End' : item.label);
                const titleStr = item.title;

                link.innerHTML = `
                    <span class="text-[10px] font-bold uppercase tracking-widest ${index === currentIndex ? 'text-papua-earth dark:text-papua-gold' : 'text-gray-400 dark:text-gray-500 group-hover:text-gray-500'}">${labelStr}</span>
                    <span class="text-sm font-serif font-medium mt-1 ${index === currentIndex ? 'text-gray-900 dark:text-white font-semibold' : 'text-gray-700 dark:text-gray-300'} truncate w-full">${titleStr}</span>
                `;
                
                tocContainer.appendChild(link);
            });
        }

        // Load specific chapter
        function loadChapter(index) {
            if (index < 0 || index >= constitutionData.length) return;
            
            currentIndex = index;
            const data = constitutionData[currentIndex];

            // Animate out
            chapterContainer.classList.remove('opacity-100');
            chapterContainer.classList.add('opacity-0');
            
            setTimeout(() => {
                // Scroll to top
                scrollContainer.scrollTo({ top: 0, behavior: 'smooth' });

                // Update Content
                if(data.type === 'cover' || data.type === 'outro') {
                    chapterLabel.textContent = '';
                    chapterTitle.textContent = data.title;
                    chapterTitle.className = "text-5xl md:text-7xl font-serif font-bold text-gray-900 dark:text-white leading-tight tracking-tight";
                } else {
                    chapterLabel.textContent = data.label;
                    chapterTitle.textContent = data.title;
                    chapterTitle.className = "text-4xl md:text-5xl lg:text-6xl font-serif font-bold text-gray-900 dark:text-white leading-tight";
                }
                
                chapterBody.innerHTML = data.content;
                
                // Re-initialize any icons in the new content
                feather.replace();

                // Update UI state
                updateNavigation();
                renderTOC();
                updateProgress();

                // Animate in
                chapterContainer.classList.remove('opacity-0');
                chapterContainer.classList.add('opacity-100');
            }, 300); // Wait for fade out
        }

        // Handle Prev/Next
        function navigate(direction) {
            loadChapter(currentIndex + direction);
        }

        // Update Nav Buttons
        function updateNavigation() {
            // Prev Button
            if (currentIndex === 0) {
                btnPrev.classList.add('invisible');
            } else {
                btnPrev.classList.remove('invisible');
            }

            // Next Button
            if (currentIndex === constitutionData.length - 1) {
                btnNext.classList.add('hidden');
            } else {
                btnNext.classList.remove('hidden');
                
                // Change button text for last real chapter
                const nextText = btnNext.querySelector('span');
                if (currentIndex === constitutionData.length - 2) {
                    nextText.textContent = 'Selesaikan';
                } else if (currentIndex === 0) {
                    nextText.textContent = 'Mulai Membaca';
                } else {
                    nextText.textContent = 'Selanjutnya';
                }
            }
        }

        // Update Progress Bar
        function updateProgress() {
            const totalChapters = constitutionData.length - 1; // Exclude cover from logic if needed, but let's keep it simple
            let displayProgress = "";
            let percentage = 0;

            if (currentIndex === 0) {
                displayProgress = "Sampul";
                percentage = 0;
            } else if (currentIndex === constitutionData.length - 1) {
                displayProgress = "Penutup";
                percentage = 100;
            } else {
                displayProgress = `Bab ${currentIndex} / 10`;
                percentage = (currentIndex / 10) * 100;
            }

            progressText.textContent = displayProgress;
            document.getElementById('progress-bar').style.width = `${percentage}%`;
        }

        // Mobile Sidebar Toggle
        function toggleSidebar() {
            const isClosed = sidebar.classList.contains('-translate-x-full');
            
            if (isClosed) {
                sidebar.classList.remove('-translate-x-full');
                mobileOverlay.classList.remove('hidden');
                setTimeout(() => mobileOverlay.classList.remove('opacity-0'), 10);
            } else {
                sidebar.classList.add('-translate-x-full');
                mobileOverlay.classList.add('opacity-0');
                setTimeout(() => mobileOverlay.classList.add('hidden'), 300);
            }
        }

        // Theme Toggle (Dark/Light)
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            if (isDarkMode) {
                document.documentElement.classList.add('dark');
            } else {
                document.documentElement.classList.remove('dark');
            }
            updateThemeUI();
        }

        function updateThemeUI() {
            const themeIcon = document.getElementById('theme-icon');
            const themeText = document.getElementById('theme-text');
            
            if (isDarkMode) {
                themeIcon.setAttribute('data-feather', 'sun');
                themeText.textContent = 'Light Mode';
            } else {
                themeIcon.setAttribute('data-feather', 'moon');
                themeText.textContent = 'Dark Mode';
            }
            feather.replace();
        }

        // Start App
        document.addEventListener('DOMContentLoaded', init);

    </script>
</body>
</html>
